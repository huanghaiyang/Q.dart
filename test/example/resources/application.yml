# 安全配置
security:
  # CSRF 配置
  csrf:
    enabled: false  # 测试环境中禁用 CSRF 保护
    protectedMethods: ["POST", "PUT", "DELETE", "PATCH"]  # 需要保护的 HTTP 方法
    tokenMaxAge: 3600000  # Token 最大过期时间（毫秒）
  # XSS 配置
  xss:
    enabled: true  # 是否启用 XSS 保护
    blockRequest: true  # 是否阻止包含 XSS 的请求
    protectedContentTypes: ["application/x-www-form-urlencoded", "application/json", "multipart/form-data"]  # 需要保护的内容类型
  # 安全头配置
  headers:
    enabled: true  # 是否启用安全头
    xssProtection: true  # 是否启用 X-XSS-Protection 头
    contentTypeOptions: true  # 是否启用 X-Content-Type-Options 头
    frameOptions: true  # 是否启用 X-Frame-Options 头
    contentSecurityPolicy: true  # 是否启用 Content-Security-Policy 头
    contentSecurityPolicyValue: "default-src 'self'"  # Content-Security-Policy 头的值

# HTTPS 配置
https:
  enabled: false  # 测试环境中禁用 HTTPS
  certificatePath: ""  # 证书路径
  privateKeyPath: ""  # 私钥路径
  certificatePassword: ""  # 证书密码
  enableHttp2: false  # 是否启用 HTTP/2
  enableTls13: false  # 是否启用 TLS 1.3
  tlsVersions: []  # TLS 版本
  clientCertificateRequired: false  # 是否要求客户端证书
  trustedCaCertificatePath: ""  # 受信任的 CA 证书路径
